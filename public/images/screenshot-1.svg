<svg xmlns="http://www.w3.org/2000/svg" width="320" height="694" viewBox="0 0 320 694" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif">
  <rect width="320" height="694" fill="#F7F8FA"/>

  <!-- status bar -->
  <text x="26" y="38" font-size="14" font-weight="600" fill="#18202E">9:41</text>
  <rect x="270" y="24" width="24" height="14" rx="3" fill="none" stroke="#18202E" stroke-width="1.4"/>
  <rect x="272.5" y="26.5" width="16" height="9" rx="1.5" fill="#18202E"/>

  <!-- header -->
  <text x="26" y="86" font-size="13" font-weight="600" fill="#3B5BDB" letter-spacing="0.6">TODAY'S WORKOUT</text>
  <text x="26" y="116" font-size="26" font-weight="700" fill="#18202E">Endurance ride</text>
  <text x="26" y="140" font-size="14" fill="#5B6472">60 min · Zone 2 · ~520 kJ</text>

  <!-- effort meter -->
  <rect x="20" y="160" width="280" height="92" rx="16" fill="#ffffff" stroke="#E4E7EC"/>
  <text x="40" y="188" font-size="12" font-weight="600" fill="#5B6472">EFFORT</text>
  <rect x="40" y="200" width="240" height="10" rx="5" fill="#EEF0F4"/>
  <rect x="40" y="200" width="96" height="10" rx="5" fill="#3B5BDB"/>
  <text x="40" y="234" font-size="13" fill="#18202E" font-weight="600">Easy–moderate</text>
  <text x="280" y="234" font-size="13" fill="#9aa0ab" text-anchor="end">2 / 5</text>

  <!-- segments -->
  <text x="26" y="290" font-size="14" font-weight="700" fill="#18202E">Session plan</text>
  <g>
    <rect x="20" y="304" width="280" height="56" rx="14" fill="#ffffff" stroke="#E4E7EC"/>
    <circle cx="46" cy="332" r="14" fill="#EEF0F4"/>
    <text x="46" y="337" font-size="13" font-weight="700" fill="#3B5BDB" text-anchor="middle">1</text>
    <text x="74" y="328" font-size="13.5" font-weight="600" fill="#18202E">Warm-up</text>
    <text x="74" y="346" font-size="12" fill="#5B6472">10 min · easy spin</text>
  </g>
  <g>
    <rect x="20" y="370" width="280" height="56" rx="14" fill="#ffffff" stroke="#E4E7EC"/>
    <circle cx="46" cy="398" r="14" fill="#EEF0F4"/>
    <text x="46" y="403" font-size="13" font-weight="700" fill="#3B5BDB" text-anchor="middle">2</text>
    <text x="74" y="394" font-size="13.5" font-weight="600" fill="#18202E">Steady aerobic</text>
    <text x="74" y="412" font-size="12" fill="#5B6472">40 min · Zone 2, conversational</text>
  </g>
  <g>
    <rect x="20" y="436" width="280" height="56" rx="14" fill="#ffffff" stroke="#E4E7EC"/>
    <circle cx="46" cy="464" r="14" fill="#EEF0F4"/>
    <text x="46" y="469" font-size="13" font-weight="700" fill="#3B5BDB" text-anchor="middle">3</text>
    <text x="74" y="460" font-size="13.5" font-weight="600" fill="#18202E">Cool-down</text>
    <text x="74" y="478" font-size="12" fill="#5B6472">10 min · easy spin</text>
  </g>

  <!-- coach note -->
  <rect x="20" y="508" width="280" height="78" rx="16" fill="#EEF0F4"/>
  <text x="40" y="536" font-size="12" font-weight="600" fill="#3B5BDB" letter-spacing="0.5">COACH NOTE</text>
  <text x="40" y="558" font-size="12.5" fill="#5B6472">Keep it relaxed — if your legs feel flat,</text>
  <text x="40" y="575" font-size="12.5" fill="#5B6472">ending 10 minutes early is completely fine.</text>

  <!-- primary button -->
  <rect x="20" y="602" width="280" height="48" rx="14" fill="#3B5BDB"/>
  <text x="160" y="631" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Start workout</text>
</svg>
