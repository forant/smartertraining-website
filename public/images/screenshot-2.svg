<svg xmlns="http://www.w3.org/2000/svg" width="320" height="694" viewBox="0 0 320 694" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif">
  <rect width="320" height="694" fill="#F7F8FA"/>

  <!-- status bar -->
  <text x="26" y="38" font-size="14" font-weight="600" fill="#18202E">9:41</text>
  <rect x="270" y="24" width="24" height="14" rx="3" fill="none" stroke="#18202E" stroke-width="1.4"/>
  <rect x="272.5" y="26.5" width="16" height="9" rx="1.5" fill="#18202E"/>

  <!-- header -->
  <text x="26" y="86" font-size="13" font-weight="600" fill="#3B5BDB" letter-spacing="0.6">DAILY CHECK-IN</text>
  <text x="26" y="116" font-size="26" font-weight="700" fill="#18202E">How are you today?</text>
  <text x="26" y="140" font-size="13.5" fill="#5B6472">Takes 20 seconds. It shapes today's plan.</text>

  <!-- energy -->
  <text x="26" y="182" font-size="14" font-weight="700" fill="#18202E">Energy</text>
  <g font-size="12.5" font-weight="600">
    <rect x="20" y="194" width="84" height="36" rx="18" fill="#ffffff" stroke="#E4E7EC"/>
    <text x="62" y="217" fill="#5B6472" text-anchor="middle">Low</text>
    <rect x="116" y="194" width="84" height="36" rx="18" fill="#3B5BDB"/>
    <text x="158" y="217" fill="#ffffff" text-anchor="middle">Okay</text>
    <rect x="212" y="194" width="88" height="36" rx="18" fill="#ffffff" stroke="#E4E7EC"/>
    <text x="256" y="217" fill="#5B6472" text-anchor="middle">High</text>
  </g>

  <!-- soreness -->
  <text x="26" y="270" font-size="14" font-weight="700" fill="#18202E">Soreness</text>
  <g font-size="12.5" font-weight="600">
    <rect x="20" y="282" width="84" height="36" rx="18" fill="#ffffff" stroke="#E4E7EC"/>
    <text x="62" y="305" fill="#5B6472" text-anchor="middle">None</text>
    <rect x="116" y="282" width="84" height="36" rx="18" fill="#E8A33D"/>
    <text x="158" y="305" fill="#18202E" text-anchor="middle">Legs</text>
    <rect x="212" y="282" width="88" height="36" rx="18" fill="#ffffff" stroke="#E4E7EC"/>
    <text x="256" y="305" fill="#5B6472" text-anchor="middle">All over</text>
  </g>

  <!-- time available -->
  <text x="26" y="358" font-size="14" font-weight="700" fill="#18202E">Time available today</text>
  <rect x="20" y="372" width="280" height="64" rx="16" fill="#ffffff" stroke="#E4E7EC"/>
  <rect x="40" y="408" width="240" height="8" rx="4" fill="#EEF0F4"/>
  <rect x="40" y="408" width="120" height="8" rx="4" fill="#3B5BDB"/>
  <circle cx="160" cy="412" r="10" fill="#ffffff" stroke="#3B5BDB" stroke-width="3"/>
  <text x="40" y="397" font-size="13" font-weight="600" fill="#18202E">About 1 hour</text>

  <!-- schedule note -->
  <text x="26" y="476" font-size="14" font-weight="700" fill="#18202E">Anything we should know?</text>
  <rect x="20" y="488" width="280" height="64" rx="16" fill="#ffffff" stroke="#E4E7EC"/>
  <text x="40" y="516" font-size="12.5" fill="#5B6472">Slept poorly, busy day at work,</text>
  <text x="40" y="534" font-size="12.5" fill="#5B6472">kids' soccer this evening.</text>

  <!-- summary -->
  <rect x="20" y="568" width="280" height="46" rx="14" fill="#EEF0F4"/>
  <circle cx="44" cy="591" r="6" fill="#E8A33D"/>
  <text x="60" y="588" font-size="12" fill="#5B6472">We'll keep today light and short</text>
  <text x="60" y="603" font-size="12" fill="#5B6472">so it fits the day you described.</text>

  <!-- button -->
  <rect x="20" y="628" width="280" height="48" rx="14" fill="#3B5BDB"/>
  <text x="160" y="657" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Update today's plan</text>
</svg>
