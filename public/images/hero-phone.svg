<svg xmlns="http://www.w3.org/2000/svg" width="320" height="694" viewBox="0 0 320 694" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif">
  <rect width="320" height="694" fill="#F7F8FA"/>

  <!-- status bar -->
  <text x="26" y="38" font-size="14" font-weight="600" fill="#18202E">9:41</text>
  <g fill="#18202E">
    <rect x="246" y="26" width="18" height="11" rx="2"/>
    <rect x="270" y="24" width="24" height="14" rx="3" fill="none" stroke="#18202E" stroke-width="1.4"/>
    <rect x="272.5" y="26.5" width="16" height="9" rx="1.5"/>
  </g>

  <!-- header -->
  <text x="26" y="92" font-size="13" font-weight="600" fill="#3B5BDB" letter-spacing="0.6">TUESDAY, MAY 18</text>
  <text x="26" y="124" font-size="28" font-weight="700" fill="#18202E">Today</text>

  <!-- recommendation card -->
  <rect x="20" y="150" width="280" height="232" rx="20" fill="#18202E"/>
  <rect x="20" y="150" width="280" height="232" rx="20" fill="url(#g)" opacity="0.9"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B5BDB"/>
      <stop offset="1" stop-color="#2A3C7A"/>
    </linearGradient>
  </defs>
  <rect x="40" y="172" width="118" height="24" rx="12" fill="#ffffff" fill-opacity="0.16"/>
  <circle cx="55" cy="184" r="3" fill="#E8A33D"/>
  <text x="66" y="188" font-size="11" font-weight="600" fill="#ffffff">FITS YOUR DAY</text>
  <text x="40" y="232" font-size="23" font-weight="700" fill="#ffffff">Endurance ride</text>
  <text x="40" y="258" font-size="14" fill="#ffffff" fill-opacity="0.72">60 min · Zone 2 · Moderate</text>
  <text x="40" y="290" font-size="12.5" fill="#ffffff" fill-opacity="0.6">Sized down for a lighter-energy day —</text>
  <text x="40" y="307" font-size="12.5" fill="#ffffff" fill-opacity="0.6">steady aerobic work, nothing draining.</text>
  <rect x="40" y="324" width="240" height="40" rx="12" fill="#ffffff"/>
  <text x="160" y="349" font-size="14" font-weight="600" fill="#18202E" text-anchor="middle">Start workout</text>

  <!-- why this card -->
  <rect x="20" y="402" width="280" height="104" rx="16" fill="#ffffff" stroke="#E4E7EC"/>
  <text x="40" y="432" font-size="12" font-weight="600" fill="#3B5BDB" letter-spacing="0.5">WHY THIS</text>
  <text x="40" y="456" font-size="13" fill="#5B6472">You logged low energy and sore legs.</text>
  <text x="40" y="475" font-size="13" fill="#5B6472">We swapped intervals for an easy ride so</text>
  <text x="40" y="494" font-size="13" fill="#5B6472">you stay consistent without digging a hole.</text>

  <!-- quick stats -->
  <rect x="20" y="526" width="134" height="78" rx="16" fill="#ffffff" stroke="#E4E7EC"/>
  <text x="40" y="556" font-size="12" fill="#5B6472">This week</text>
  <text x="40" y="584" font-size="20" font-weight="700" fill="#18202E">3 / 4 done</text>
  <rect x="166" y="526" width="134" height="78" rx="16" fill="#ffffff" stroke="#E4E7EC"/>
  <text x="186" y="556" font-size="12" fill="#5B6472">Freshness</text>
  <text x="186" y="584" font-size="20" font-weight="700" fill="#E8A33D">Good</text>

  <!-- tab bar -->
  <rect x="0" y="634" width="320" height="60" fill="#ffffff"/>
  <rect x="0" y="634" width="320" height="1" fill="#E4E7EC"/>
  <circle cx="56" cy="660" r="4" fill="#3B5BDB"/>
  <text x="56" y="680" font-size="10" font-weight="600" fill="#3B5BDB" text-anchor="middle">Today</text>
  <circle cx="138" cy="660" r="4" fill="#C2C7D0"/>
  <text x="138" y="680" font-size="10" fill="#9aa0ab" text-anchor="middle">Plan</text>
  <circle cx="204" cy="660" r="4" fill="#C2C7D0"/>
  <text x="204" y="680" font-size="10" fill="#9aa0ab" text-anchor="middle">Check-in</text>
  <circle cx="270" cy="660" r="4" fill="#C2C7D0"/>
  <text x="270" y="680" font-size="10" fill="#9aa0ab" text-anchor="middle">You</text>
</svg>
