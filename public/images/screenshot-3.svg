<svg xmlns="http://www.w3.org/2000/svg" width="320" height="694" viewBox="0 0 320 694" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif">
  <rect width="320" height="694" fill="#F7F8FA"/>

  <!-- status bar -->
  <text x="26" y="38" font-size="14" font-weight="600" fill="#18202E">9:41</text>
  <rect x="270" y="24" width="24" height="14" rx="3" fill="none" stroke="#18202E" stroke-width="1.4"/>
  <rect x="272.5" y="26.5" width="16" height="9" rx="1.5" fill="#18202E"/>

  <!-- header -->
  <text x="26" y="86" font-size="13" font-weight="600" fill="#3B5BDB" letter-spacing="0.6">YOUR WEEK</text>
  <text x="26" y="116" font-size="26" font-weight="700" fill="#18202E">Plan adjusted</text>

  <!-- adapt banner -->
  <rect x="20" y="134" width="280" height="60" rx="16" fill="#EEF0F4"/>
  <circle cx="46" cy="164" r="11" fill="#E8A33D"/>
  <path d="M41 164 l4 4 l8 -8" stroke="#18202E" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="68" y="160" font-size="12.5" font-weight="600" fill="#18202E">You missed Tuesday's ride.</text>
  <text x="68" y="178" font-size="12" fill="#5B6472">We rebalanced the rest of the week —</text>
  <text x="68" y="193" font-size="12" fill="#5B6472" font-style="normal">no make-up cramming, no guilt.</text>

  <!-- week list -->
  <g>
    <rect x="20" y="210" width="280" height="52" rx="14" fill="#ffffff" stroke="#E4E7EC"/>
    <text x="40" y="234" font-size="12" font-weight="700" fill="#9aa0ab">MON</text>
    <text x="40" y="251" font-size="13" font-weight="600" fill="#18202E">Intervals · 45 min</text>
    <text x="280" y="243" font-size="12" font-weight="600" fill="#3B5BDB" text-anchor="end">Done</text>
  </g>
  <g>
    <rect x="20" y="270" width="280" height="52" rx="14" fill="#ffffff" stroke="#E4E7EC"/>
    <text x="40" y="294" font-size="12" font-weight="700" fill="#9aa0ab">TUE</text>
    <text x="40" y="311" font-size="13" font-weight="600" fill="#9aa0ab" text-decoration="line-through">Endurance · 60 min</text>
    <text x="280" y="303" font-size="12" font-weight="600" fill="#9aa0ab" text-anchor="end">Skipped</text>
  </g>
  <g>
    <rect x="20" y="330" width="280" height="52" rx="14" fill="#ffffff" stroke="#3B5BDB" stroke-width="1.6"/>
    <text x="40" y="354" font-size="12" font-weight="700" fill="#3B5BDB">WED</text>
    <text x="40" y="371" font-size="13" font-weight="600" fill="#18202E">Easy ride · 50 min</text>
    <text x="280" y="363" font-size="12" font-weight="600" fill="#E8A33D" text-anchor="end">Adjusted</text>
  </g>
  <g>
    <rect x="20" y="390" width="280" height="52" rx="14" fill="#ffffff" stroke="#E4E7EC"/>
    <text x="40" y="414" font-size="12" font-weight="700" fill="#9aa0ab">THU</text>
    <text x="40" y="431" font-size="13" font-weight="600" fill="#18202E">Rest day</text>
    <text x="280" y="423" font-size="12" fill="#9aa0ab" text-anchor="end">—</text>
  </g>
  <g>
    <rect x="20" y="450" width="280" height="52" rx="14" fill="#ffffff" stroke="#E4E7EC"/>
    <text x="40" y="474" font-size="12" font-weight="700" fill="#9aa0ab">SAT</text>
    <text x="40" y="491" font-size="13" font-weight="600" fill="#18202E">Long ride · 2 hr</text>
    <text x="280" y="483" font-size="12" font-weight="600" fill="#E8A33D" text-anchor="end">Adjusted</text>
  </g>

  <!-- summary card -->
  <rect x="20" y="518" width="280" height="96" rx="16" fill="#18202E"/>
  <text x="40" y="548" font-size="12" font-weight="600" fill="#8FA1E0" letter-spacing="0.5">STILL ON TRACK</text>
  <text x="40" y="574" font-size="15" font-weight="700" fill="#ffffff">Your goal hasn't moved.</text>
  <text x="40" y="596" font-size="12.5" fill="#ffffff" fill-opacity="0.66">One missed ride won't derail the block —</text>
  <text x="40" y="612" font-size="12.5" fill="#ffffff" fill-opacity="0.66">consistency over the month is what counts.</text>

  <!-- button -->
  <rect x="20" y="628" width="280" height="48" rx="14" fill="#3B5BDB"/>
  <text x="160" y="657" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">View full plan</text>
</svg>
